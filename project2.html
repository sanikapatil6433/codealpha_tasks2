<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#121212;
    
}

.light{
    background:#f5f5f5;
}

.light .calculator{
    background:white;
}

.light #display{
    background:#eaeaea;
    color:black;
}

.calculator{
    width:320px;
    background:#130f0f;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

#display{
    width:100%;
    height:70px;
    font-size:30px;
    text-align:right;
    padding:15px;
    border:none;
    outline:none;
    border-radius:10px;
    margin-bottom:20px;
    background:#2b2b2b;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#333;
    color:white;
    transition:0.3s;
}

button:hover{
    background:#555;
}

.operator{
    background:#ff9500;
}

.operator:hover{
    background:#ffb347;
}

.equal{
    background:#28a745;
}

.equal:hover{
    background:#3dd35c;
}

.clear{
    background:#dc3545;
}

.Bracket{
    background:#ff9500;

}

.clear:hover{
    background:#ff4d5a;
}

</style>

</head>
<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="Bracket" onclick="toggleBracket()">()</button>
<button class="operator" onclick="append('/')">÷</button>
<button class="operator" onclick="append('*')">×</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('-')">-</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="squareRoot()">√</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="deleteLast()">⌫</button>
<button class="equal" onclick="calculate()">=</button>


</div>

</div>

<script>

let display=document.getElementById("display");

let openBracket = true;

function toggleBracket(){

    if(openBracket){

        display.value += "(";

    }
    else{

        display.value += ")";

    }

    openBracket = !openBracket;

}


function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value="";
}

function deleteLast(){
    display.value=display.value.slice(0,-1);
}

function calculate(){

    try{
        display.value=eval(display.value);
    }

    catch{
        display.value="Error";
    }

}

function square(){
    display.value = display.value * display.value;
}

function squareRoot(){
    display.value = Math.sqrt(display.value);
}

// Keyboard Support

document.addEventListener("keydown",function(event){

    let key=event.key;

    if(
        (key>='0' && key<='9') ||
        key==='+' ||
        key==='-' ||
        key==='*' ||
        key==='/' ||
        key==='.'
    ){

        append(key);

    }

    else if(key==="Enter"){

        calculate();

    }

    else if(key==="Backspace"){

        deleteLast();

    }

    else if(key==="Escape"){

        clearDisplay();

    }

});

</script>

</body>
</html>
